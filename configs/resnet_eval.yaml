resnet_data_dir: resnet_data
models_dir: outputs/resnet_training
output_dir: outputs/resnet_evaluation
datasets: [cifar10, eurosat_rgb, beans]
augmentation_types: [original, augmented, generated]

num_folds: 5
batch_size: 32
random_seed: 42
train_fraction: 0.8
num_workers: 0

resnet:
  image_sizes:
    cifar10: 32
    eurosat_rgb: 64
    default: 224
  augmentation:
    rotation_degrees: 15
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.05
  normalization:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

wandb:
  project: ${oc.env:WANDB_PROJECT,PNW}
  entity: ${oc.env:WANDB_ENTITY,PNW}
  group: resnet-evaluation
  tags: [resnet, eval]
