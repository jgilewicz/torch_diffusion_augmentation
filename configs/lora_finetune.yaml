model_name: Efficient-Large-Model/Sana_1600M_1024px_BF16_diffusers
train_script: diffusers/examples/dreambooth/train_dreambooth_lora_sana.py
output_root: outputs/lora_finetune

resolution: 512
max_train_steps: 300
lora_rank: 2
lora_alpha: 2
learning_rate: 1e-4
gradient_accumulation_steps: 1
train_batch_size: 1
mixed_precision: bf16
lr_scheduler: constant
lr_warmup_steps: 0
instance_prompt: a photo

wandb:
  project: ${oc.env:WANDB_PROJECT,PNW}
  run_group: sana-lora-finetune

datasets:
  - name: cifar10
    dataset_dir: data/sana_cifar10
    output_name: SANA-LoRA-CIFAR10
    validation_prompt: "a low-resolution photo of an airplane, CIFAR-10 style"
  - name: eurosat_rgb
    dataset_dir: data/sana_eurosat_rgb
    output_name: SANA-LoRA-EuroSAT-RGB
    validation_prompt: "a satellite image of AnnualCrop, EuroSAT style"
  - name: beans
    dataset_dir: data/sana_beans
    output_name: SANA-LoRA-Beans
    validation_prompt: "a photo of a bean leaf with healthy"
